---
name: Check cross-references

on:
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/check-cross-refs.yml"
      - "src/**/*.mdx"
      - "src/**/*.md"
      - "pipeline/preprocessors/link_map.py"
      - "scripts/check_cross_refs.py"

jobs:
  check-cross-refs:
    name: Check @[ref] cross-references
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python 3.13 + uv
        uses: "./.github/actions/uv_setup"
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync --group test

      - name: Check cross-references
        run: make check-cross-refs
